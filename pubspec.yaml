name: flutter_analysis_integration
description: Poilabs Analysis SDK Flutter integration sample app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1B2A4A"
  adaptive_icon_foreground: assets/icon/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
